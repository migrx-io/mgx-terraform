apiVersion: v1
kind: api
metadata:
  plugin:
    storage:
      config: add
spec:
  name: default
  storage_bucket: {s3_bucket_name}
  cache_r_cache_size: 4096
  cache_rw_cache_size: 1024
  qos_rw_ios_per_sec: 16000
  qos_r_mbytes_per_sec: 250
  qos_w_mbytes_per_sec: 250
---
apiVersion: v1
kind: api
metadata:
  plugin:
    scheduler:
      config: add
spec:
  bucket_selector: {s3_bucket_name}
  default: "yes"
  enabled: "yes"
  labels: "default=yes"
  name: default
  node_selector: null
  pool_selector: null
